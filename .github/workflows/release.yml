name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to publish
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        default: ""
        type: string
      draft:
        description: Create as draft release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: champ-windows
            bundle_path: src-tauri/target/release/bundle
            package_ext: zip
            bundle_args: ""
          - name: macOS
            os: macos-latest
            artifact_name: champ-macos
            bundle_path: src-tauri/target/release/bundle
            package_ext: tar.gz
            bundle_args: ""
          - name: Linux
            os: ubuntu-latest
            artifact_name: champ-linux
            bundle_path: src-tauri/target/release/bundle
            package_ext: tar.gz
            bundle_args: "--bundles deb,rpm"

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            librsvg2-dev \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build ${{ matrix.bundle_args }}

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "${{ matrix.bundle_path }}\*" -DestinationPath "release-assets\${{ matrix.artifact_name }}-${{ env.RELEASE_TAG }}.zip" -Force

      - name: Package bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/${{ matrix.artifact_name }}-${{ env.RELEASE_TAG }}.${{ matrix.package_ext }}" -C "${{ matrix.bundle_path }}" .

      - name: Upload packaged bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name || '' }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME != '' && env.RELEASE_NAME || env.RELEASE_TAG }}
          draft: ${{ env.RELEASE_DRAFT == 'true' }}
          generate_release_notes: true
          files: release-assets/*
