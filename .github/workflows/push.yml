name: Build App

on:
  push:
    branches: ["main"]

concurrency:
  group: push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: ${{ !contains(github.event.head_commit.message || '', 'ci-skip') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: champ-windows
            bundle_path: src-tauri/target/release/bundle
          - name: macOS
            os: macos-latest
            artifact_name: champ-macos
            bundle_path: src-tauri/target/release/bundle
          - name: Linux
            os: ubuntu-latest
            artifact_name: champ-linux
            bundle_path: src-tauri/target/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            librsvg2-dev \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error
          retention-days: 14
