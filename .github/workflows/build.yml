name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 180

    env:
      APP_NAME: CAMPP
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import certificate.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -s "$KEYCHAIN_NAME"
          security find-identity -v "$KEYCHAIN_NAME"

          rm -f certificate.p12

      - name: Get signing identity
        id: signing_identity
        run: |
          set -euo pipefail

          IDENTITY=$(security find-identity -v "$KEYCHAIN_NAME" | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application certificate found"
            exit 1
          fi

          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "Found identity: $IDENTITY"

      - name: Update tauri.conf.json with signing identity
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        shell: python3 {0}
        run: |
          import json, os

          path = "src-tauri/tauri.conf.json"
          with open(path, "r", encoding="utf-8") as f:
              config = json.load(f)

          config.setdefault("bundle", {}).setdefault("macOS", {})
          config["bundle"]["macOS"]["signingIdentity"] = os.environ["IDENTITY"]

          with open(path, "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)
              f.write("\n")

      - name: Create macOS signing helper script
        run: |
          cat > sign_and_verify_macos.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          APP_PATH="$1"
          IDENTITY="$2"
          ENTITLEMENTS="$3"
          KEYCHAIN_NAME="$4"
          KEYCHAIN_PASSWORD="$5"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found: $APP_PATH"
            exit 1
          fi

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          while IFS= read -r item; do
            codesign --force --timestamp --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$item"
          done < <(find "$APP_PATH" -type d -name "*.app" ! -path "$APP_PATH" | sort -r)

          while IFS= read -r item; do
            codesign --force --timestamp --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$item"
          done < <(find "$APP_PATH" -type d -name "*.xpc" | sort -r)

          while IFS= read -r item; do
            codesign --force --timestamp --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$item"
          done < <(find "$APP_PATH" -type d -name "*.appex" | sort -r)

          while IFS= read -r item; do
            codesign --force --timestamp --sign "$IDENTITY" "$item"
          done < <(find "$APP_PATH" -type d -name "*.framework" | sort -r)

          while IFS= read -r item; do
            codesign --force --timestamp --sign "$IDENTITY" "$item"
          done < <(find "$APP_PATH" -type f -name "*.dylib" | sort)

          while IFS= read -r item; do
            codesign --force --timestamp --sign "$IDENTITY" "$item"
          done < <(
            find "$APP_PATH" -type f \
              ! -name "*.dylib" \
              ! -path "*/Contents/_CodeSignature/*" \
              -print0 | while IFS= read -r -d '' f; do
                if file "$f" | grep -q "Mach-O"; then
                  printf '%s\n' "$f"
                fi
              done | sort
          )

          codesign --force --timestamp --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          EOF

          chmod +x sign_and_verify_macos.sh

      - name: Create macOS notarization helper script
        run: |
          cat > notarize_and_staple.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          FILE_TO_NOTARIZE="$1"
          APPLE_ID="$2"
          APPLE_PASSWORD="$3"
          APPLE_TEAM_ID="$4"

          SUBMISSION_OUTPUT=$(xcrun notarytool submit "$FILE_TO_NOTARIZE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)

          echo "$SUBMISSION_OUTPUT"

          STATUS=$(echo "$SUBMISSION_OUTPUT" | python3 -c 'import sys, json; print(json.load(sys.stdin)["status"])')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$FILE_TO_NOTARIZE"
          xcrun stapler validate "$FILE_TO_NOTARIZE"
          EOF

          chmod +x notarize_and_staple.sh

      - name: Build ARM64
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build x64
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Sign ARM64 app
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          ./sign_and_verify_macos.sh "$APP_PATH" "$IDENTITY" "$ENTITLEMENTS" "$KEYCHAIN_NAME" "$KEYCHAIN_PASSWORD"

      - name: Create ARM64 DMG
        id: arm64_dmg
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          DMG_PATH="${DMG_DIR}/${APP_NAME}-${VERSION}-arm64.dmg"

          mkdir -p "$DMG_DIR"
          rm -f "$DMG_PATH"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize ARM64 DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./notarize_and_staple.sh "${{ steps.arm64_dmg.outputs.dmg_path }}" "$APPLE_ID" "$APPLE_PASSWORD" "$APPLE_TEAM_ID"

      - name: Sign x64 app
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          ./sign_and_verify_macos.sh "$APP_PATH" "$IDENTITY" "$ENTITLEMENTS" "$KEYCHAIN_NAME" "$KEYCHAIN_PASSWORD"

      - name: Create x64 DMG
        id: x64_dmg
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          DMG_DIR="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg"
          DMG_PATH="${DMG_DIR}/${APP_NAME}-${VERSION}-x64.dmg"

          mkdir -p "$DMG_DIR"
          rm -f "$DMG_PATH"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize x64 DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./notarize_and_staple.sh "${{ steps.x64_dmg.outputs.dmg_path }}" "$APPLE_ID" "$APPLE_PASSWORD" "$APPLE_TEAM_ID"

      - name: Create universal app
        run: |
          set -euo pipefail

          ARM64_APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          X64_APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          UNIVERSAL_APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/${APP_NAME}.app"

          rm -rf "$UNIVERSAL_APP"
          mkdir -p "$(dirname "$UNIVERSAL_APP")"
          ditto "$ARM64_APP" "$UNIVERSAL_APP"

          while IFS= read -r x64_file; do
            rel_path="${x64_file#$X64_APP/}"
            arm64_file="$ARM64_APP/$rel_path"
            universal_file="$UNIVERSAL_APP/$rel_path"

            if [ -f "$arm64_file" ] && file "$x64_file" | grep -q "Mach-O" && file "$arm64_file" | grep -q "Mach-O"; then
              rm -f "$universal_file"
              mkdir -p "$(dirname "$universal_file")"
              lipo -create -output "$universal_file" "$arm64_file" "$x64_file"
            fi
          done < <(find "$X64_APP/Contents" -type f | sort)

      - name: Verify universal binary
        run: |
          set -euo pipefail
          APP_BIN=$(find "src-tauri/target/universal-apple-darwin/release/bundle/macos/${APP_NAME}.app/Contents/MacOS" -type f | head -1)
          echo "Main binary: $APP_BIN"
          file "$APP_BIN"
          lipo -info "$APP_BIN"

      - name: Sign universal app
        env:
          IDENTITY: ${{ steps.signing_identity.outputs.identity }}
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          ENTITLEMENTS="$PWD/src-tauri/entitlements.plist"
          ./sign_and_verify_macos.sh "$APP_PATH" "$IDENTITY" "$ENTITLEMENTS" "$KEYCHAIN_NAME" "$KEYCHAIN_PASSWORD"

      - name: Create universal DMG
        id: universal_dmg
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          DMG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          DMG_PATH="${DMG_DIR}/${APP_NAME}-${VERSION}-universal.dmg"

          mkdir -p "$DMG_DIR"
          rm -f "$DMG_PATH"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize universal DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./notarize_and_staple.sh "${{ steps.universal_dmg.outputs.dmg_path }}" "$APPLE_ID" "$APPLE_PASSWORD" "$APPLE_TEAM_ID"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-macOS
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/CAMPP-*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/CAMPP-*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/CAMPP-*.dmg
          if-no-files-found: error
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from package.json
        id: get_version
        shell: pwsh
        run: |
          $VERSION = (node -p "require('./package.json').version")
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $VERSION"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Rename Windows artifacts with version
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          Write-Host "Renaming artifacts to include version: $version"

          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File | ForEach-Object {
            $filename = $_.Name
            $ext = [System.IO.Path]::GetExtension($_.FullName)

            if ($filename -match '_x64[-_]' -or $filename -match 'x64') {
              $arch = "x64"
            } elseif ($filename -match '_ia32[-_]' -or $filename -match 'ia32') {
              $arch = "ia32"
            } elseif ($filename -match '_arm64[-_]' -or $filename -match 'arm64') {
              $arch = "arm64"
            } else {
              $arch = "x64"
            }

            $newName = "CAMPP-$version-$arch$ext"
            Write-Host "Renaming: $filename -> $newName"
            Rename-Item -Path $_.FullName -NewName (Join-Path $_.DirectoryName $newName) -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: List Windows artifacts
        shell: pwsh
        run: |
          Write-Host "=== Windows bundle files ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | ForEach-Object { Write-Host $_.FullName }

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Rename Linux artifacts with version
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Renaming artifacts to include version: $VERSION"

          for filepath in \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/rpm/*.rpm; do

            [ -f "$filepath" ] || continue

            dir=$(dirname "$filepath")
            filename=$(basename "$filepath")
            ext="${filename##*.}"

            if [[ "$filename" =~ amd64|x86_64 ]]; then
              arch="amd64"
            elif [[ "$filename" =~ arm64|aarch64 ]]; then
              arch="arm64"
            elif [[ "$filename" =~ i386|i686 ]]; then
              arch="i386"
            else
              arch="amd64"
            fi

            newname="CAMPP-${VERSION}-${arch}.${ext}"
            echo "Renaming: $filename -> $newname"
            mv -f "$filepath" "$dir/$newname"
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAMPP-Linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: List Linux artifacts
        run: |
          echo "=== Linux bundle files ==="
          find src-tauri/target/release/bundle -type f | sort || true

  create-release:
    needs: [build-macos, build-windows, build-linux]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: CAMPP-*
          merge-multiple: false

      - name: Show downloaded files
        run: |
          echo "=== Downloaded artifact structure ==="
          find artifacts -type f | sort

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CAMPP ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*
          fail_on_unmatched_files: false